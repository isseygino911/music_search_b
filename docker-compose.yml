services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: ./.env
    depends_on:
      - qdrant
    volumes:
      - ./logs:/app/logs

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
